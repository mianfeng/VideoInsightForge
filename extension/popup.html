<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>VideoInsightForge</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="popup-shell">
      <header class="hero-card">
        <div>
          <p class="eyebrow">Quick Trigger</p>
          <h1>VideoInsightForge</h1>
        </div>
        <span id="healthChip" class="status-chip muted">Connecting</span>
      </header>

      <section class="panel">
        <div class="section-head">
          <div>
            <p class="eyebrow">Task</p>
            <h2>Current tab</h2>
          </div>
          <button id="openBtn" class="ghost-button">Output</button>
        </div>

        <p id="tabMeta" class="support-copy">Reading the active tab...</p>

        <label class="field-stack">
          <span class="field-label">Local server</span>
          <input id="serverUrl" class="text-input" type="text" placeholder="http://127.0.0.1:8732" />
        </label>

        <label class="field-stack">
          <span class="field-label">Whisper model</span>
          <select id="modelSize" class="select-input"></select>
        </label>

        <div class="field-stack">
          <div class="split-row">
            <span class="field-label">Prompts</span>
            <span class="support-copy">Compact output views</span>
          </div>
          <div id="promptList" class="prompt-list"></div>
        </div>

        <button id="runBtn" class="primary-button">Process current tab</button>
        <p id="status" class="support-copy">Idle</p>
      </section>

      <section class="panel">
        <div class="section-head">
          <div>
            <p class="eyebrow">Reader</p>
            <h2>Latest result</h2>
          </div>
          <select id="previewType" class="select-input compact-select"></select>
        </div>

        <p id="resultTitle" class="result-title">No result yet</p>
        <pre id="preview" class="preview-box">Run a task or wait for the desktop app to generate outputs.</pre>
        <div id="paths" class="path-list"></div>
      </section>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
